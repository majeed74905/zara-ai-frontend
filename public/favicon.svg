<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark circular background -->
  <circle cx="256" cy="256" r="256" fill="#0D0118"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="200" stroke="url(#ringGlow)" stroke-width="2" stroke-opacity="0.3" fill="none"/>

  <!-- Main orbit arc - top-right to bottom-left (magenta) -->
  <path d="M 256 80 A 176 176 0 0 1 390 370" stroke="url(#arcGradient1)" stroke-width="22" stroke-linecap="round" fill="none"/>

  <!-- Main orbit arc - bottom-left to top-right (blue-purple) -->
  <path d="M 390 370 A 176 176 0 0 1 256 80" stroke="url(#arcGradient2)" stroke-width="22" stroke-linecap="round" fill="none"/>

  <!-- Node dot - top (magenta) -->
  <circle cx="256" cy="80" r="18" fill="#D946EF"/>
  <circle cx="256" cy="80" r="10" fill="#F0ABFC"/>

  <!-- Node dot - bottom-right (magenta/purple) -->
  <circle cx="390" cy="370" r="18" fill="#A855F7"/>
  <circle cx="390" cy="370" r="10" fill="#C084FC"/>

  <!-- Node dot - bottom-left (small, faded) -->
  <circle cx="122" cy="370" r="14" fill="#7C3AED" fill-opacity="0.7"/>
  <circle cx="122" cy="370" r="8" fill="#A78BFA"/>

  <!-- Center Z letter -->
  <text x="256" y="306" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="180" fill="white" text-anchor="middle" dominant-baseline="auto" letter-spacing="-5">Z</text>

  <defs>
    <linearGradient id="arcGradient1" x1="256" y1="80" x2="390" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="arcGradient2" x1="390" y1="370" x2="256" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="ringGlow" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
</svg>
